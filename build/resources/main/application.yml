# ============================================
# Order Collector Service Configuration
# ============================================

server:
  port: 8091

spring:
  application:
    name: order-collector-service
  
  # 파일 업로드 설정
  servlet:
    multipart:
      enabled: true
      max-file-size: 50MB
      max-request-size: 50MB
  
  # 데이터베이스 설정
  datasource:
    url: jdbc:postgresql://localhost:5437/collector_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
  
  # JPA 설정
  jpa:
    hibernate:
      ddl-auto: update  # 개발: update, 프로덕션: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          time_zone: UTC
    open-in-view: false
  
  # JSON 설정
  jackson:
    serialization:
      write-dates-as-timestamps: false
    time-zone: Asia/Seoul
    default-property-inclusion: non_null

# Actuator 설정
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

# 로깅 설정
logging:
  level:
    com.oms.collector: TRACE
    com.oms.collector.service: TRACE
    org.springframework.web: INFO
    org.springframework.transaction: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

# 주문 수집 설정
collector:
  schedule:
    enabled: false  # 스케줄러 켜기
    interval: 120000  # 2분 (테스트용, 원래는 600000=10분)
    initial-delay: 30000  # 30초 후 시작
    daily-cron: "0 0 0 * * *"  # 매일 자정
    retry-cron: "0 0 * * * *"  # 매시간
  retry:
    max-attempts: 3
    delay: 5000  # 5초

tracking:
  provider: ${TRACKING_PROVIDER:mock}
  post-office:
    base-url: ${POST_OFFICE_BASE_URL:http://ship.epost.go.kr}
    auth-key: ${POST_OFFICE_AUTH_KEY:}
    seed-key: ${POST_OFFICE_SEED_KEY:}
    customer-no: ${POST_OFFICE_CUSTOMER_NO:}
    contract-approval-no: ${POST_OFFICE_CONTRACT_APPROVAL_NO:}
    office-ser: ${POST_OFFICE_OFFICE_SER:}
    order-company-name: ${POST_OFFICE_ORDER_COMPANY_NAME:OMS}
    inquiry-tel: ${POST_OFFICE_INQUIRY_TEL:}
    sender-zip: ${POST_OFFICE_SENDER_ZIP:}
    sender-address: ${POST_OFFICE_SENDER_ADDRESS:}
    sender-address-detail: ${POST_OFFICE_SENDER_ADDRESS_DETAIL:}
    content-code: ${POST_OFFICE_CONTENT_CODE:029}
    default-weight: ${POST_OFFICE_DEFAULT_WEIGHT:1}
    default-volume: ${POST_OFFICE_DEFAULT_VOLUME:60}
    print-yn: ${POST_OFFICE_PRINT_YN:N}
    test-yn: ${POST_OFFICE_TEST_YN:N}
    delivery-area:
      enabled: ${POST_OFFICE_DELIVERY_AREA_ENABLED:true}
      base-url: ${POST_OFFICE_DELIVERY_AREA_BASE_URL:http://biz.epost.go.kr/KpostPortal/openapi}
      regkey: ${POST_OFFICE_DELIVERY_AREA_REGKEY:}
      mdiv: ${POST_OFFICE_DELIVERY_AREA_MDIV:1}

openai:
  api-key: ${OPENAI_API_KEY:}
  model: ${OPENAI_MODEL:gpt-5-mini}
  agent:
    enabled: ${OPENAI_AGENT_ENABLED:true}

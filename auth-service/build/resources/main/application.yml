# ============================================
# OMS 인증 서비스 설정
# ============================================

server:
  port: ${PORT:8080}

spring:
  application:
    name: auth-service

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://shuttle.proxy.rlwy.net:57289/railway?user=postgres&password=NMAOYHEaYJBwGNIZXJYVqZEurqKEHqYY}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:NMAOYHEaYJBwGNIZXJYVqZEurqKEHqYY}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false

jwt:
  secret: ${JWT_SECRET:oms-secret-key-for-jwt-token-generation-minimum-256-bits-required}
  expiration: ${JWT_EXPIRATION:86400000}

logging:
  level:
    com.logistics.scm.auth: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG